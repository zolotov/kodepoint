name: "Archive Benchmarks"

on:
  pull_request:
    types:
      - closed

permissions:
  contents: read

jobs:
  archive:
    name: Archive Bencher PR branch

    # Bencher secrets are intentionally not exposed to fork pull requests.
    if: github.event.pull_request.head.repo.full_name == github.repository

    runs-on: ubuntu-latest

    env:
      BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}

    steps:
      - name: Validate Bencher configuration
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
        run: |
          if [ -z "$BENCHER_PROJECT" ]; then
            echo "::error::Missing repository variable BENCHER_PROJECT."
            exit 1
          fi

          if [ -z "$BENCHER_API_KEY" ]; then
            echo "::error::Missing repository secret BENCHER_API_KEY."
            exit 1
          fi

      - name: Install Bencher CLI
        uses: bencherdev/bencher@7d9903445cb8a2320c2318c3c79463fcab1da36c # main
        with:
          version: 0.6.8

      - name: Archive Bencher branch
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
        run: |
          bencher archive \
            --project "$BENCHER_PROJECT" \
            --key "$BENCHER_API_KEY" \
            --branch "$GITHUB_HEAD_REF"
