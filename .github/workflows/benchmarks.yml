      - name: Install Bencher CLI
        uses: bencherdev/bencher@93f96f69269643942504ef5bfc2a1ed69eea2169 # main
        with:
          version: 0.6.8

      - name: Track main bare-metal Wasm benchmark history in Bencher
        if: github.event_name == 'push'
