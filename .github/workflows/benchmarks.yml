            exit 1
          fi

          if [ -z "$BENCHER_API_KEY" ]; then
            echo "::error::Missing repository secret BENCHER_API_KEY."
            exit 1
          fi

          case "$BENCHER_API_KEY" in
            bencher_user_*) ;;
            *)
              echo "::error::BENCHER_API_KEY must be a user-scoped Bencher API key (bencher_user_*)."
              exit 1
              ;;
          esac

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: "corretto"
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Generate CharacterData size metrics
        run: ./gradlew :unicode:characterDataMetrics

      - name: Install Bencher CLI
        uses: bencherdev/bencher@93f96f69269643942504ef5bfc2a1ed69eea2169 # main
        with:
          version: 0.6.8

      - name: Track main CharacterData size history in Bencher
        if: github.event_name == 'push'
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bencher run \
            --project "$BENCHER_PROJECT" \
            --key "$BENCHER_API_KEY" \
            --branch "$GITHUB_REF_NAME" \
            --hash "$GITHUB_SHA" \
            --testbed "$BENCHER_TESTBED" \
            --threshold-measure bytes \
            --threshold-test percentage \
            --threshold-max-sample-size 1 \
            --threshold-upper-boundary 0.0 \
            --thresholds-reset \
            --error-on-alert \
            --adapter json \
            --file unicode/build/reports/character-data/bencher-metrics.json \
            --github-actions "$GITHUB_TOKEN" \
            --ci-id character-data \
            --ci-public-links

      - name: Track pull request CharacterData size metrics in Bencher
        if: github.event_name == 'pull_request'
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          bencher run \
            --project "$BENCHER_PROJECT" \
            --key "$BENCHER_API_KEY" \
            --branch "$GITHUB_HEAD_REF" \
            --hash "$PR_HEAD_SHA" \
            --start-point "$GITHUB_BASE_REF" \
            --start-point-hash "$PR_BASE_SHA" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed "$BENCHER_TESTBED" \
            --error-on-alert \
            --adapter json \
            --file unicode/build/reports/character-data/bencher-metrics.json \
            --github-actions "$GITHUB_TOKEN" \
            --ci-id character-data \
            --ci-only-thresholds \
            --ci-public-links
