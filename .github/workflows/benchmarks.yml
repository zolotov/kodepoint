          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build runnable Wasm package
        run: ./gradlew :benchmarks:wasmJsBenchmarkPackage

      - name: Compute image tag
        id: image
        run: |
          {
            echo "tag=wasm-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
