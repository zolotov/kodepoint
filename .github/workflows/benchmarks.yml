name: "Benchmarks"

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: benchmarks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: JVM Benchmarks

    # Bencher secrets are intentionally not exposed to fork pull requests.
    if: >
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       !github.event.pull_request.draft)

    runs-on: ubuntu-latest

    env:
      BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
      BENCHER_USER_EMAIL: ${{ vars.BENCHER_USER_EMAIL }}
      BENCHER_TESTBED: intel-v1-corretto24-jmh-nonfork

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Bencher configuration
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
        run: |
          if [ -z "$BENCHER_PROJECT" ]; then
            echo "::error::Missing repository variable BENCHER_PROJECT."
            exit 1
          fi

          if [ -z "$BENCHER_USER_EMAIL" ]; then
            echo "::error::Missing repository variable BENCHER_USER_EMAIL."
            exit 1
          fi

          if [ -z "$BENCHER_API_KEY" ]; then
            echo "::error::Missing repository secret BENCHER_API_KEY."
            exit 1
          fi

          case "$BENCHER_API_KEY" in
            bencher_user_*) ;;
            *)
              echo "::error::BENCHER_API_KEY must be a user-scoped Bencher API key (bencher_user_*)."
              exit 1
              ;;
          esac

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: "corretto"
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build runnable JMH jar
        run: ./gradlew :benchmarks:jvmBenchmarkJar

      - name: Compute image tag
        id: image
        run: |
          {
            echo "tag=${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
            echo "reference=registry.bencher.dev/${BENCHER_PROJECT}:${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
            echo "image=${BENCHER_PROJECT}:${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to Bencher registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: registry.bencher.dev
          username: ${{ vars.BENCHER_USER_EMAIL }}
          password: ${{ secrets.BENCHER_API_KEY }}

      - name: Build and push benchmark image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./benchmarks
          file: ./benchmarks/docker/benchmarks.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.reference }}

      - name: Install Bencher CLI
        uses: bencherdev/bencher@93f96f69269643942504ef5bfc2a1ed69eea2169 # main
        with:
          version: 0.6.8

      - name: Track main bare-metal benchmark history in Bencher
        if: github.event_name == 'push'
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bencher run \
            --project "$BENCHER_PROJECT" \
            --key "$BENCHER_API_KEY" \
            --branch "$GITHUB_REF_NAME" \
            --hash "$GITHUB_SHA" \
            --image "${{ steps.image.outputs.image }}" \
            --testbed "$BENCHER_TESTBED" \
            --spec intel-v1 \
            --job-timeout 300 \
            --threshold-measure throughput \
            --threshold-test t_test \
            --threshold-max-sample-size 64 \
            --threshold-lower-boundary 0.99 \
            --thresholds-reset \
            --error-on-alert \
            --adapter java_jmh \
            --file /tmp/kodepoint-jmh-results.json \
            --github-actions "$GITHUB_TOKEN" \
            --ci-id jvm \
            --ci-public-links

      - name: Track pull request bare-metal benchmarks in Bencher
        if: github.event_name == 'pull_request'
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          bencher run \
            --project "$BENCHER_PROJECT" \
            --key "$BENCHER_API_KEY" \
            --branch "$GITHUB_HEAD_REF" \
            --hash "$PR_HEAD_SHA" \
            --start-point "$GITHUB_BASE_REF" \
            --start-point-hash "$PR_BASE_SHA" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --image "${{ steps.image.outputs.image }}" \
            --testbed "$BENCHER_TESTBED" \
            --spec intel-v1 \
            --job-timeout 300 \
            --error-on-alert \
            --adapter java_jmh \
            --file /tmp/kodepoint-jmh-results.json \
            --github-actions "$GITHUB_TOKEN" \
            --ci-id jvm \
            --ci-only-thresholds \
            --ci-public-links

  benchmark-wasm:
    name: Wasm Benchmarks

    # Bencher secrets are intentionally not exposed to fork pull requests.
    if: >
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
