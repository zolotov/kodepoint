  character-data-size:
    name: CharacterData Size Metrics

    # Bencher secrets are intentionally not exposed to fork pull requests.
    if: >
      github.event_name == 'push' ||
      (github.event.pull_request.head.repo.full_name == github.repository &&
       !github.event.pull_request.draft)

    runs-on: ubuntu-latest

    env:
      BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
      BENCHER_USER_EMAIL: ${{ vars.BENCHER_USER_EMAIL }}
      BENCHER_TESTBED: github-ubuntu-latest-character-data

    steps:
      - name: Checkout sources
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Validate Bencher configuration
        env:
          BENCHER_API_KEY: ${{ secrets.BENCHER_API_KEY }}
        run: |
          if [ -z "$BENCHER_PROJECT" ]; then
            echo "::error::Missing repository variable BENCHER_PROJECT."
            exit 1
          fi

          if [ -z "$BENCHER_USER_EMAIL" ]; then
