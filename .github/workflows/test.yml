name: "Tests"

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  workflow_call:

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            tasks: jvmTest jsTest wasmJsTest linuxX64Test
          - os: macos-latest
            tasks: jvmTest iosSimulatorArm64Test macosArm64Test tvosSimulatorArm64Test watchosSimulatorArm64Test
          - os: windows-latest
            tasks: jvmTest mingwX64Test

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout sources
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'temurin'
          java-version: 24

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Run tests
        run: ./gradlew ${{ matrix.tasks }}

      - name: Publish Test Report
        if: always()
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
        with:
          name: Tests Report (${{ matrix.os }})
          path: "**/build/test-results/**/*.xml"
          reporter: java-junit