name: Release
permissions: {}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version"
        required: true

run-name: "Release ${{ inputs.version }}"

jobs:
  tests:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read
      actions: read
      checks: write

  release:
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}
    steps:
      - name: Validate version input
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$VERSION" =~ ^[0-9A-Za-z][0-9A-Za-z._+-]*$ ]]; then
            echo "::error::Version must start with an ASCII letter or number and may only contain '.', '-', '_' or '+'."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: 24

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SECRET_ASCII_ARMORED }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SECRET_ASCII_ARMORED }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSWORD }}

          # Properties expected by the gradle-maven-publish-plugin
          # https://vanniktech.github.io/gradle-maven-publish-plugin/central/#__tabbed_5_2
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_TOKEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_TOKEN_PASSWORD }}
        shell: bash
        run: ./gradlew check generateChangelog publishAndReleaseToMavenCentral "-Pversion=$VERSION" --no-configuration-cache

      - name: Commit and push change log
        id: changelog-commit
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add CHANGELOG.md
          git commit -m "Version $VERSION"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release and tag
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          tag_name: ${{ inputs.version }}
          target_commitish: ${{ steps.changelog-commit.outputs.sha }}
          body_path: build/reports/changelog/latest-release-body.md
